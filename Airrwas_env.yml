name: airrwas_env
channels:
  - conda-forge

dependencies:
  - python=3.10.14

  # Core scientific stack
  - numpy
  - pandas
  - scipy=1.11.3
  - scikit-learn=1.5.0

  # Stats / bioinformatics
  - scikit-bio
  - statsmodels
  - scikit-posthocs

  # Plotting
  - matplotlib
  - seaborn
  - plotly
  - upsetplot
  - python-kaleido
  - nbformat

  # Clustering and network analysis
  - networkx
  - pyvis=0.3.2
  - python-louvain=0.16

  # IO / utilities
  - tqdm
  - openpyxl

  # pip fallback
  - pip